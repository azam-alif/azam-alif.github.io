<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Sumaya | Celebration</title>
<meta name="description" content="Celebrate Sumaya's birthday with fireworks and animated greetings!">
<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial, sans-serif;
}
h1 {
  position: absolute;
  font-size: 6em;
  font-weight: bold;
  color: white;
  text-align: center;
  z-index: 10;
  text-shadow: 0 0 20px #fff, 0 0 40px #ff00ff, 0 0 70px #00ffff;
  opacity: 0;
}
/* Animations */
@keyframes fromLeft {0%{transform:translateX(-100vw);opacity:0;}100%{transform:translateX(0);opacity:1;}}
@keyframes fromRight {0%{transform:translateX(100vw);opacity:0;}100%{transform:translateX(0);opacity:1;}}
@keyframes fromBottom {0%{transform:translateY(100vh);opacity:0;}100%{transform:translateY(0);opacity:1;}}
@keyframes emergeStrong {0%{transform:scale(0.3);opacity:0;}60%{transform:scale(1.3);opacity:1;}100%{transform:scale(1);opacity:1;}}
@keyframes blink {0%,50%,100%{opacity:1;}25%,75%{opacity:0;}}
@keyframes screenShake {0%{transform:translate(0,0);}10%{transform:translate(-10px,5px);}20%{transform:translate(10px,-5px);}30%{transform:translate(-10px,5px);}40%{transform:translate(10px,-5px);}50%{transform:translate(-10px,5px);}60%{transform:translate(10px,-5px);}70%{transform:translate(-10px,5px);}80%{transform:translate(10px,-5px);}90%{transform:translate(-5px,2px);}100%{transform:translate(0,0);}}
.blink { animation: blink 0.5s infinite; }
.shakeScreen { animation: screenShake 0.5s; }
canvas { position:absolute; top:0; left:0; }
</style>
</head>
<body>

<h1 id="text"></h1>
<!-- SEO-friendly plain text for Google -->
<h2 style="position:absolute; left:-9999px;">Happy Birthday Sumaya - Celebrate with fireworks and animation!</h2>

<canvas id="fireworks"></canvas>

<script>
const sequence = [
  { word: "Happy", anim: "fromLeft 0.8s forwards" },
  { word: "Happy", anim: "fromRight 0.8s forwards" },
  { word: "Happy", anim: "fromBottom 0.8s forwards" },
  { word: "Birthday", anim: "fromLeft 0.8s forwards" },
  { word: "Birthday", anim: "fromRight 0.8s forwards" },
  { word: "Birthday", anim: "fromBottom 0.8s forwards" }
];

let index = 0;
let sumayaEmerges = 0;
let finalPhase = false;

const textElement = document.getElementById("text");
const bodyEl = document.body;

function playSequence() {
  if (index < sequence.length) {
    const item = sequence[index];
    textElement.style.animation = "none";
    void textElement.offsetWidth;
    textElement.textContent = item.word;
    textElement.style.animation = item.anim;
    textElement.style.opacity = "1";
    index++;
    setTimeout(playSequence, 1200);
    return;
  }

  if (sumayaEmerges < 5) {
    textElement.style.animation = "none";
    void textElement.offsetWidth;
    textElement.textContent = "Sumaya";
    textElement.style.animation = "emergeStrong 1s forwards";
    textElement.classList.add("blink");
    bodyEl.classList.add("shakeScreen");
    sumayaEmerges++;
    setTimeout(() => {
      bodyEl.classList.remove("shakeScreen");
      textElement.classList.remove("blink");
      setTimeout(playSequence, 200);
    }, 1000);
    return;
  }

  finalPhase = true;
  textElement.style.animation = "none";
  textElement.textContent = "HAPPY BIRTHDAY SUMAYA";
  textElement.style.opacity = "1";
}

playSequence();

/* Fireworks */
const canvas = document.getElementById("fireworks");
const ctx = canvas.getContext("2d");
function resizeCanvas(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
resizeCanvas();
window.addEventListener("resize",resizeCanvas);
let particles = [];
function createFirework(intensity=80){
  const x = Math.random()*canvas.width;
  const y = Math.random()*canvas.height/2;
  for(let i=0;i<intensity;i++){
    particles.push({x,y,radius:2,color:`hsl(${Math.random()*360},100%,50%)`,angle:Math.random()*2*Math.PI,speed:Math.random()*6+1,alpha:1});
  }
}
function updateParticles(){
  ctx.fillStyle="rgba(0,0,0,0.2)";
  ctx.fillRect(0,0,canvas.width,canvas.height);
  particles.forEach((p,i)=>{
    p.x+=Math.cos(p.angle)*p.speed;
    p.y+=Math.sin(p.angle)*p.speed;
    p.alpha-=0.01;
    ctx.globalAlpha=p.alpha;
    ctx.fillStyle=p.color;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);
    ctx.fill();
    if(p.alpha<=0) particles.splice(i,1);
  });
  ctx.globalAlpha=1;
}
function animate(){updateParticles();requestAnimationFrame(animate);}
setInterval(()=>{
  if(sumayaEmerges>0 && sumayaEmerges<=5){
    createFirework(200);
  } else if(finalPhase){
    createFirework(200);
  } else {
    createFirework(80);
  }
},500);
animate();
</script>

</body>
</html>
